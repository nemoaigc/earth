    - paragraph [ref=e43]:
      - text: A web component to represent data visualization layers on a 3-dimensional globe in a spherical projection. This library is a convenience wrapper around the
      - link "three-globe" [ref=e44] [cursor=pointer]:
        - /url: https://github.com/vasturiano/three-globe
      - text: plugin, and uses
      - link "ThreeJS" [ref=e45] [cursor=pointer]:
        - /url: https://github.com/mrdoob/three.js/
      - text: /WebGL for 3D rendering.
    - paragraph [ref=e46]:
      - text: See also the
      - link "AR version" [ref=e47] [cursor=pointer]:
        - /url: https://github.com/vasturiano/globe-ar
      - text: .
    - paragraph [ref=e48]:
      - text: And check out the
      - link "React bindings" [ref=e49] [cursor=pointer]:
        - /url: https://github.com/vasturiano/react-globe.gl
      - text: .
