<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Lost Planet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', system-ui, sans-serif; }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; }

    /* Apple-style glassmorphism UI */
    .ui-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 50;
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    /* Top bar */
    .top-bar {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 28px;
      border-radius: 50px;
      pointer-events: auto;
      z-index: 60;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: white;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* ── Loading screen ────────────────────────────────────────────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #080810;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 1s ease, visibility 1s;
    }
    #loading-screen.fade-out {
      opacity: 0;
      visibility: hidden;
    }
    /* subtle aurora gradient in background */
    #loading-screen::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(60, 100, 200, 0.12) 0%,
        transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .ls-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }
    .ls-eyebrow {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
    }
    .ls-title {
      font-size: clamp(48px, 8vw, 112px);
      font-weight: 200;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.92);
      line-height: 1;
    }
    .ls-sub {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-top: 2px;
    }
    /* thin loading line at very bottom */
    .ls-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 1px;
      width: 0%;
      background: rgba(255,255,255,0.25);
      animation: ls-bar-fill 2.5s ease-out forwards;
    }
    @keyframes ls-bar-fill {
      to { width: 85%; }
    }

  </style>
</head>
<body>
  <!-- Loading screen — removed by main.ts once globe is ready -->
  <div id="loading-screen" aria-label="Loading Lost Planet">
    <div class="ls-content">
      <div class="ls-eyebrow">An Extinction Record</div>
      <div class="ls-title">Lost Planet</div>
      <div class="ls-sub">Species that vanished from Earth</div>
    </div>
    <div class="ls-bar"></div>
  </div>

  <div id="app"></div>

  <div class="ui-overlay">
    <!-- Top navigation -->
    <div class="top-bar glass">
      <div class="logo">Lost Planet</div>
    </div>

  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
