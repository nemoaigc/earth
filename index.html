<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Lost Planet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', system-ui, sans-serif; }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; }

    /* Apple-style glassmorphism UI */
    .ui-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 50;
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    /* Top bar */
    .top-bar {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 28px;
      border-radius: 50px;
      pointer-events: auto;
      z-index: 60;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: white;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* ── Loading screen ────────────────────────────────────────────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #060810;
      /* fade-out class triggers the exit transition */
      transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1),
                  visibility 0.9s;
    }
    #loading-screen.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .ls-title {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.92);
      /* breathe: scale 0.98→1.02 per Disney principle */
      animation: ls-breathe 3s ease-in-out infinite;
    }
    .ls-sub {
      font-size: clamp(11px, 1.5vw, 14px);
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    .ls-dots {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .ls-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.55);
      animation: ls-pulse 1.5s ease-in-out infinite;
    }
    .ls-dot:nth-child(2) { animation-delay: 0.3s; }
    .ls-dot:nth-child(3) { animation-delay: 0.6s; }

    /* subtle top-edge glow */
    #loading-screen::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(120,170,255,0.4) 40%,
        rgba(80,200,220,0.5) 60%,
        transparent);
      animation: ls-glow 3s ease-in-out infinite;
    }

    @keyframes ls-breathe {
      0%, 100% { transform: scale(1);    opacity: 0.92; }
      50%       { transform: scale(1.02); opacity: 1;    }
    }
    @keyframes ls-pulse {
      0%, 100% { opacity: 0.25; transform: scale(0.85); }
      50%       { opacity: 1;    transform: scale(1.15); }
    }
    @keyframes ls-glow {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1;   }
    }

  </style>
</head>
<body>
  <!-- Loading screen — removed by main.ts once globe is ready -->
  <div id="loading-screen" aria-label="Loading Lost Planet">
    <div class="ls-title">Lost Planet</div>
    <div class="ls-sub">Where extinct species once roamed</div>
    <div class="ls-dots">
      <div class="ls-dot"></div>
      <div class="ls-dot"></div>
      <div class="ls-dot"></div>
    </div>
  </div>

  <div id="app"></div>

  <div class="ui-overlay">
    <!-- Top navigation -->
    <div class="top-bar glass">
      <div class="logo">Lost Planet</div>
    </div>

  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
