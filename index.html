<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Lost Planet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', system-ui, sans-serif; }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; }

    /* Apple-style glassmorphism UI */
    .ui-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 50;
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    /* Top bar */
    .top-bar {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 28px;
      border-radius: 50px;
      pointer-events: auto;
      z-index: 60;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: white;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 6px;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.85);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    /* Bottom info */
    .bottom-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 24px;
      border-radius: 16px;
      pointer-events: auto;
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bottom-text {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.5px;
    }

    .bottom-text span {
      color: rgba(255, 255, 255, 0.95);
      font-weight: 600;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="ui-overlay">
    <!-- Top navigation -->
    <div class="top-bar glass">
      <div class="logo">Lost Planet</div>
      <div class="nav-links">
        <button class="nav-btn">Explore</button>
        <button class="nav-btn">Species</button>
        <button class="nav-btn">About</button>
      </div>
    </div>

    <!-- Bottom info -->
    <div class="bottom-bar glass">
      <div class="bottom-text">Drag to rotate</div>
      <div class="dot"></div>
      <div class="bottom-text">Scroll to zoom</div>
      <div class="dot"></div>
      <div class="bottom-text"><span>Lost Planet</span> — Where extinct species once roamed</div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
